# CUAD Domain Configuration
# Contract Understanding Atticus Dataset (4042 tests, 462 documents)
# Source: https://www.atticusprojectai.org/cuad

project:
  domain: "cuad"
  description: "Commercial contract clause extraction benchmark"

data:
  raw_dir: "data/raw/cuad"
  ground_truth_dir: "data/ground_truth"
  ground_truth_file: "cuad_qa.json"

vector_store:
  persist_path: "data/indices/cuad_index"

chunking:
  chunk_size: 512
  chunk_overlap: 50
